<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>新课题上线</title>
</head>
<body style="margin:0;padding:0;background:#f0f4ff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif;">
  <div style="display:none;max-height:0;overflow:hidden;" th:text="'新课题：' + ${topicTitle}">预读</div>
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="padding:28px 12px;">
    <tr>
      <td align="center">
        <table role="presentation" style="max-width:600px;width:100%;background:#ffffff;border-radius:16px;overflow:hidden;box-shadow:0 14px 44px rgba(47,84,235,0.12);border:1px solid #d6e4ff;">
          <tr>
            <td style="background:linear-gradient(125deg,#2f54eb 0%,#597ef7 45%,#85a5ff 100%);padding:26px 28px;text-align:center;">
              <div style="font-size:36px;margin-bottom:6px;">📢</div>
              <p style="margin:0;color:rgba(255,255,255,0.95);font-size:13px;font-weight:600;letter-spacing:2px;text-transform:uppercase;">NEW TOPIC</p>
              <h1 style="margin:8px 0 0;color:#ffffff;font-size:20px;font-weight:700;line-height:1.35;">有新课题上线啦</h1>
            </td>
          </tr>
          <tr>
            <td style="padding:26px 30px 8px;">
              <p style="margin:0 0 12px;color:#2c3e50;font-size:15px;">
                <span th:text="${studentName}">同学</span> 您好，
              </p>
              <p style="margin:0 0 18px;color:#5c6b7a;font-size:15px;line-height:1.75;">
                导师发布了新的毕业论文课题，您可登录系统查看详情并按要求在开放时间内提交申请。
              </p>
              <table width="100%" style="border-radius:14px;background:linear-gradient(180deg,#f9faff 0%,#ffffff 100%);border:1px solid #adc6ff;overflow:hidden;">
                <tr>
                  <td style="padding:20px 22px;">
                    <p style="margin:0 0 12px;font-size:12px;color:#597ef7;font-weight:700;letter-spacing:0.5px;">课题信息</p>
                    <p style="margin:0 0 10px;color:#1d39c4;font-size:17px;font-weight:700;line-height:1.45;" th:text="${topicTitle}">课题标题</p>
                    <table width="100%" cellspacing="0" cellpadding="6" style="font-size:14px;color:#434a54;">
                      <tr>
                        <td style="width:72px;color:#8c8c8c;">指导教师</td>
                        <td style="font-weight:600;" th:text="${teacherName}">—</td>
                      </tr>
                      <tr>
                        <td style="color:#8c8c8c;">专业要求</td>
                        <td th:text="${major}">—</td>
                      </tr>
                      <tr>
                        <td style="color:#8c8c8c;">难度</td>
                        <td th:text="${difficultyLabel}">—</td>
                      </tr>
                      <tr>
                        <td style="color:#8c8c8c;">课题编号</td>
                        <td><span style="display:inline-block;padding:2px 10px;background:#f0f5ff;border-radius:6px;font-family:monospace;font-size:13px;" th:text="${topicId}">#</span></td>
                      </tr>
                    </table>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          <tr>
            <td style="padding:8px 30px 28px;text-align:center;">
              <a th:href="${linkStudentTopics}" target="_blank" rel="noopener noreferrer" style="display:inline-block;padding:14px 36px;background:linear-gradient(135deg,#2f54eb,#597ef7);color:#ffffff !important;text-decoration:none;border-radius:999px;font-size:15px;font-weight:600;box-shadow:0 8px 24px rgba(47,84,235,0.35);">前往选题列表</a>
              <p th:if="${linksConfigured}" style="margin:16px 0 0;font-size:12px;color:#95a5a6;word-break:break-all;" th:text="|链接：${linkStudentTopics}|">链接</p>
              <p th:unless="${linksConfigured}" style="margin:16px 0 0;font-size:12px;color:#95a5a6;">请配置前端地址以启用按钮跳转。</p>
            </td>
          </tr>
          <tr>
            <td style="padding:16px 24px;background:#fafafa;border-top:1px solid #f0f0f0;text-align:center;">
              <p style="margin:0;font-size:12px;color:#a0a7b4;line-height:1.6;" th:text="${siteName} + ' · 本邮件由系统自动发送'">页脚</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
