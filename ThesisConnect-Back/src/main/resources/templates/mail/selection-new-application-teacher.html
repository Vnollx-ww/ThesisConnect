<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>新的选题申请</title>
</head>
<body style="margin:0;padding:0;background:#fff8f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif;">
  <div style="display:none;max-height:0;overflow:hidden;" th:text="'新申请：' + ${topicTitle}">预读</div>
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="padding:28px 12px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" style="max-width:600px;background:#ffffff;border-radius:14px;overflow:hidden;border:1px solid #ffe4c4;box-shadow:0 10px 36px rgba(250,140,22,0.12);">
          <tr>
            <td style="background:linear-gradient(90deg,#fa8c16 0%,#faad14 100%);padding:22px 28px;">
              <table width="100%" cellspacing="0" cellpadding="0">
                <tr>
                  <td style="vertical-align:middle;">
                    <span style="font-size:28px;vertical-align:middle;">🔔</span>
                    <span style="margin-left:10px;color:#ffffff;font-size:18px;font-weight:700;vertical-align:middle;">待您审核 · 新选题申请</span>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          <tr>
            <td style="padding:28px 30px 12px;">
              <p style="margin:0 0 14px;color:#434a54;font-size:15px;">
                <span th:text="${teacherName}">老师</span> 您好，
              </p>
              <p style="margin:0 0 20px;color:#5c6b7a;font-size:15px;line-height:1.75;">
                一名学生刚刚向您的课题提交了选题申请，请在系统中及时处理。
              </p>
              <table role="presentation" width="100%" style="background:linear-gradient(145deg,#fffbf5,#fff7e6);border-radius:12px;border-left:4px solid #fa8c16;">
                <tr>
                  <td style="padding:20px 22px;">
                    <table width="100%" cellspacing="0" cellpadding="6" style="font-size:14px;color:#2c3e50;">
                      <tr>
                        <td style="width:88px;color:#8c8c8c;">学生</td>
                        <td style="font-weight:600;" th:text="${studentName}">—</td>
                      </tr>
                      <tr>
                        <td style="color:#8c8c8c;">课题</td>
                        <td style="font-weight:600;line-height:1.5;" th:text="${topicTitle}">—</td>
                      </tr>
                      <tr>
                        <td style="color:#8c8c8c;">提交时间</td>
                        <td th:text="${submittedAt}">—</td>
                      </tr>
                    </table>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          <tr>
            <td style="padding:8px 30px 28px;text-align:center;">
              <p style="margin:0 0 16px;font-size:13px;color:#ad6800;background:#fffbe6;padding:12px 16px;border-radius:8px;border:1px dashed #ffd591;">
                ⏱ 建议尽快审核，以便学生安排后续志愿与确认。
              </p>
              <a th:href="${linkTeacherTopics}" target="_blank" rel="noopener noreferrer" style="display:inline-block;padding:12px 28px;background:#fa8c16;color:#fff !important;text-decoration:none;border-radius:8px;font-weight:600;font-size:14px;">登录教师端处理</a>
              <p th:if="${linksConfigured}" style="margin:16px 0 0;font-size:12px;color:#95a5a6;word-break:break-all;" th:text="|链接：${linkTeacherTopics}|">链接</p>
            </td>
          </tr>
          <tr>
            <td style="padding:16px 24px;background:#fafafa;border-top:1px solid #f0f0f0;text-align:center;">
              <p style="margin:0;font-size:12px;color:#a0a7b4;" th:text="${siteName} + ' · 系统自动通知'">页脚</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
