<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>选题申请已通过</title>
</head>
<body style="margin:0;padding:0;background:#ecfdf5;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="padding:32px 12px;">
    <tr>
      <td align="center">
        <table role="presentation" style="max-width:600px;width:100%;background:#ffffff;border-radius:16px;overflow:hidden;box-shadow:0 12px 32px rgba(82,196,26,0.15);">
          <tr>
            <td style="padding:36px 32px 24px;text-align:center;background:radial-gradient(ellipse 120% 100% at 50% 0%,#f6ffed 0%,#ffffff 55%);">
              <div style="width:64px;height:64px;margin:0 auto 16px;background:linear-gradient(145deg,#52c41a,#389e0d);border-radius:50%;line-height:64px;font-size:32px;">✓</div>
              <h2 style="margin:0;color:#135200;font-size:20px;font-weight:700;">恭喜，选题申请已通过</h2>
              <p style="margin:10px 0 0;color:#5c6b7a;font-size:14px;">请按系统提示完成后续确认与进度填报</p>
            </td>
          </tr>
          <tr>
            <td style="padding:0 36px 28px;">
              <p style="margin:0 0 16px;color:#2c3e50;font-size:15px;">
                <span th:text="${studentName}">同学</span> 您好，
              </p>
              <p style="margin:0 0 22px;color:#5c6b7a;font-size:15px;line-height:1.75;">
                您申请的课题已由指导教师审核通过。请登录系统查看详情，并在规定时间内完成「确认」等步骤。
              </p>
              <div style="border-radius:12px;background:#f6ffed;border:1px solid #b7eb8f;padding:20px 22px;">
                <table width="100%" cellspacing="0" cellpadding="8" style="font-size:14px;">
                  <tr>
                    <td style="color:#73d13d;width:72px;vertical-align:top;">课题</td>
                    <td style="color:#262626;font-weight:600;line-height:1.5;" th:text="${topicTitle}">—</td>
                  </tr>
                  <tr>
                    <td style="color:#73d13d;vertical-align:top;">导师</td>
                    <td style="color:#262626;font-weight:600;" th:text="${teacherName}">—</td>
                  </tr>
                  <tr>
                    <td style="color:#73d13d;vertical-align:top;">备注</td>
                    <td style="color:#595959;line-height:1.6;white-space:pre-wrap;" th:text="${comment}">—</td>
                  </tr>
                </table>
              </div>
            </td>
          </tr>
          <tr>
            <td style="padding:0 36px 32px;text-align:center;">
              <a th:href="${linkStudentMyTopic}" target="_blank" rel="noopener noreferrer" style="display:inline-block;padding:14px 32px;background:linear-gradient(135deg,#52c41a,#389e0d);color:#fff !important;text-decoration:none;border-radius:999px;font-weight:600;font-size:14px;box-shadow:0 6px 18px rgba(82,196,26,0.35);">前往「我的选题」确认</a>
              <p th:if="${linksConfigured}" style="margin:16px 0 0;font-size:12px;color:#95a5a6;word-break:break-all;" th:text="|链接：${linkStudentMyTopic}|">链接</p>
            </td>
          </tr>
          <tr>
            <td style="padding:18px;background:#fafafa;text-align:center;border-top:1px solid #f0f0f0;">
              <p style="margin:0;font-size:12px;color:#a0a7b4;" th:text="${siteName} + ' · 祝学业顺利'">页脚</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
